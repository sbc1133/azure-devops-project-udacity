name: Deploy to Azure WebApp

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy using Azure CLI (ZIP Deploy)
        run: |
          az webapp deploy \
            --resource-group Azuredevops \
            --name udacity-webapp-shivali \
            --src-path . \
            --type zip
